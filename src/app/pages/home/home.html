<!-- Falling leaves -->
<div class="leaves-bg" aria-hidden="true">
  <span class="leaf leaf-1">🍂</span>
  <span class="leaf leaf-2">🍁</span>
  <span class="leaf leaf-3">🍂</span>
  <span class="leaf leaf-4">🍁</span>
  <span class="leaf leaf-5">🍂</span>
  <span class="leaf leaf-6">🍁</span>
  <span class="leaf leaf-7">🍂</span>
  <span class="leaf leaf-8">🍁</span>
  <span class="leaf leaf-9">🍂</span>
  <span class="leaf leaf-10">🍁</span>
  <span class="leaf leaf-11">🍂</span>
  <span class="leaf leaf-12">🍁</span>
</div>

<!-- Hero -->
<section class="hero">

  <!-- Eyebrow -->
  <p class="label hero-eyebrow">Portfolio · 2026</p>

  <!-- Main intro -->
  <div class="hero-intro">

    <!-- "Hi, I'm" — typewriter line 1 -->
    <span class="hero-greeting">
      {{ greeting() }}<span class="cursor" [class.cursor--hidden]="phase() !== 'greeting'">|</span>

    </span>

    <!-- "Vo Ba Quan." — typewriter line 2 -->
    <h1 class="hero-name">
      {{ name() }}<span class="cursor cursor--name" [class.cursor--hidden]="phase() === 'greeting' || phase() === 'done'">|</span>
    </h1>

    <!-- Role badge — xuất hiện sau khi gõ xong -->
    @if (phase() === 'done') {
      <div class="hero-role-wrap">
        <span class="hero-role">Web Developer</span>
      </div>
    }
  </div>

  <!-- Tagline -->
  @if (phase() === 'done') {
    <p class="hero-tagline">
      I craft <span class="accent-text">thoughtful</span> interfaces<br>
      with clean code and intentional design.
    </p>

    <div class="hero-actions">
      <a href="#projects" class="btn btn-primary">View My Work</a>
      <a href="#contact"  class="btn btn-outline">Say Hello</a>
    </div>
  }

  <!-- Wax seal -->
  <div class="wax-seal hero-seal">
    <span>VBQ<br>2026</span>
  </div>

  <!-- Scroll hint -->
  @if (phase() === 'done') {
    <div class="scroll-hint" aria-hidden="true">
      <span class="label">Scroll</span>
      <div class="scroll-line"></div>
    </div>
  }

</section>
